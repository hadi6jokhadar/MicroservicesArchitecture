# PostgreSQL Replica Configuration
# This file is automatically created during pg_basebackup with -R flag

# Connection to primary server
primary_conninfo = 'host=postgres-primary port=5432 user=replicator password=replicator_password application_name=replica1'

# Replication slot
primary_slot_name = 'replication_slot'

# Enable hot standby (read-only queries on replica)
hot_standby = on
hot_standby_feedback = on

# Recovery settings
restore_command = ''
archive_cleanup_command = ''
