global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "microservices"
    static_configs:
      - targets:
          - "host.docker.internal:5001"   # IdentityService
          - "host.docker.internal:5002"   # TenantService
          - "host.docker.internal:5004"   # NotificationService
          - "host.docker.internal:5005"   # FileManagerService
          - "host.docker.internal:5006"   # TranslationService
          - "host.docker.internal:5007"   # CategoryService
          - "host.docker.internal:5008"   # AIService (Python /metrics via prometheus-fastapi-instrumentator)
    metrics_path: /metrics
    scrape_timeout: 10s
